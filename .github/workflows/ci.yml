name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Xvfb (required for Chromium with extensions)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: npm ci
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run self-tests under Xvfb
        run: xvfb-run --auto-servernum npm test
        env:
          # Force-show output so timeouts are diagnosable in CI logs.
          CI: 'true'
